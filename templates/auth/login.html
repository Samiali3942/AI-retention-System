<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RetentionAI</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Login CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="login-container">
        <!-- Background Animation -->
        <div class="bg-animation">
            <div class="floating-circle circle-1"></div>
            <div class="floating-circle circle-2"></div>
            <div class="floating-circle circle-3"></div>
            <div class="floating-circle circle-4"></div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <!-- Brand Section -->
            <div class="brand-section">
                <div class="brand-logo">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h1 class="brand-title">RetentionAI</h1>
                <p class="brand-subtitle">Sign in to your account</p>
            </div>

            <!-- Alert Messages -->
            <div id="alertContainer"></div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <!-- Email Field -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input 
                            type="email" 
                            class="form-control login-input" 
                            id="email" 
                            name="email" 
                            placeholder="Enter your email"
                            required
                        >
                        <div class="input-focus-border"></div>
                    </div>
                    <div class="invalid-feedback"></div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            class="form-control login-input" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="password-toggle" id="passwordToggle">
                            <i class="fas fa-eye"></i>
                        </button>
                        <div class="input-focus-border"></div>
                    </div>
                    <div class="invalid-feedback"></div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-options">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-login" id="loginButton">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i>
                    </span>
                </button>
            </form>

            <!-- Demo Credentials -->
            <div class="demo-section">
                <div class="demo-header">
                    <i class="fas fa-info-circle"></i>
                    <span>Demo Credentials</span>
                </div>
                <div class="demo-credentials">
                    <div class="demo-item">
                        <strong>Email:</strong> admin@retentionai.com
                    </div>
                    <div class="demo-item">
                        <strong>Password:</strong> admin123
                    </div>
                </div>
                <button type="button" class="btn btn-outline-primary btn-sm" id="fillDemoBtn">
                    Use Demo Credentials
                </button>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p>&copy; 2025 RetentionAI. All rights reserved.</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Login JS -->
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
