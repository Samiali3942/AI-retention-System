{% extends "base.html" %}
{% block title %}Customer Insights{% endblock %}
{% block content %}
<div class="container-fluid">
    <h1><i class="fas fa-chart-line me-3"></i>Customer Insights</h1>
    <div class="row my-3">
        <div class="col-auto"><span id="shape" class="badge bg-primary"></span></div>
    </div>

    <h4>Numeric Distributions</h4>
    <div id="numeric-charts" class="row g-3"></div>

    <h4 class="mt-4">Categorical Distributions</h4>
    <div id="categorical-charts" class="row g-3"></div>

    <h4 class="mt-4">Model Outputs</h4>
    <div id="extra-charts" class="row g-3"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/insights.js') }}"></script>
{% endblock %}
